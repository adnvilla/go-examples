version: 2
updates:
  # Go modules — weekly, grouped into a single PR
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      go-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # GitHub Actions — keep action versions up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]
