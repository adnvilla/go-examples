services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  # Used by: examples/redis
  # Connect: localhost:6379
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MySQL ──────────────────────────────────────────────────────────────────
  # Used by: examples/mysql
  # Connect: localhost:3306, user=root password=secret database=examples
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: examples
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Used by: examples/postgres
  # Connect: localhost:5432, user=postgres password=secret database=examples
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: examples
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d examples"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── DynamoDB Local ─────────────────────────────────────────────────────────
  # Used by: examples/dynamodb
  # Connect: http://localhost:8000
  # Run tests: DYNAMODB_LOCAL=1 go test ./examples/dynamodb/...
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── StatsD / Datadog Agent (metric example) ────────────────────────────────
  # Used by: examples/metric
  # A lightweight StatsD sink that prints received metrics to stdout.
  # Connect: localhost:8125 (UDP)
  statsd:
    image: ghcr.io/statsd/statsd:latest
    ports:
      - "8125:8125/udp"
      - "8126:8126"

  # ── Kafka (KRaft mode, single broker) ────────────────────────────────────────
  # Used by: examples/kafka
  # Connect: localhost:9092 — set KAFKA_LOCAL=1 for tests
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"

  # ── Jaeger (otel example) ──────────────────────────────────────────────────
  # Used by: examples/otel
  # UI: http://localhost:16686 — OTLP ingest: 4318 (HTTP), 4317 (gRPC)
  # Run the example with OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
